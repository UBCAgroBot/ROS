name: Test Setup ROS

on:
  push:
    branches:
      - main

jobs:
  test_setup_ros:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:noble

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: '.'

      - name: Sparse checkout specific folder
        run: |
          # Initialize sparse checkout
          git config core.sparseCheckout true
          # Specify the folder to checkout
          echo "workspace_cpp/ros2/src/node-test/" >> .git/info/sparse-checkout
          # Pull the specific folder from the main branch
          git checkout main
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Run build and test script
        run: .github/workflows/build-and-test.sh

      - name: Setup ROS
        uses: ros-tooling/setup-ros@v0.7

      - name: Checkout ament_lint
        uses: actions/checkout@v4
        with:
          repository: ament/ament_lint
          ref: humble
          path: 'ament_lint'

      - name: Try default linter
        uses: ./
        with:
          package-name: ament_copyright ament_lint
          workspace-directory: ament_lint

      - name: Try a linter with additional arguments
        uses: ./
        with:
          linter: lint_cmake
          arguments: '--filter=-linelength,+syntax'
          package-name: ament_cmake_cpplint
          workspace-directory: ament_lint

      - name: Try a linter with underscores in the name
        uses: ./
        with:
          linter: lint_cmake
          arguments: '--filter=-linelength'
          package-name: ament_cmake_cpplint
          workspace-directory: ament_lint
